<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She Can Foundation Form</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <img src="image.png" class="logo">

    <h2>She Can Foundation Form</h2>

<form id="loginform">

<input id="username" placeholder="Enter Name" type="text">

<input id="email" type="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Enter Password">

<button>SUBMIT</button>

</form>

<p id="result"></p>

</div>

<script>

const loginform=document.querySelector("#loginform");
const username=document.querySelector("#username");
const email=document.querySelector("#email");
const password=document.querySelector("#password");
const message=document.querySelector("#result");

loginform.addEventListener("submit",(event)=>{

event.preventDefault();

if(username.value.trim()===""){
    message.textContent="Please enter name";
    message.style.color="red";
}

else if(email.value.trim()===""){
    message.textContent="Please enter email";
    message.style.color="red";
}

else if(password.value.trim()===""){
    message.textContent="Please enter password";
    message.style.color="red";
}

else if(password.value.length<6){
    message.textContent="Password must be at least 6 characters long";
    message.style.color="red";
}

else{
    message.textContent="Form Submitted Successfully";
    message.style.color="green";

    username.value="";
    email.value="";
    password.value="";
}

})

</script>

</body>
</html>
